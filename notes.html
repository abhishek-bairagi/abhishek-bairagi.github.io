    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .sidebar {
            width: 250px;

            position: fixed;
            top: 0;
            left: 0;
            padding: 20px;

        .sidebar a {
            display: block;

        .content {
            margin-left: 270px;
            padding: 20px;
            flex-grow: 1;
        }
        h1 {
            font-size: 36px;
            text-align: center;
        }

        <h2>Navigation</h2>
